<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Stock Alarm</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div>
        <p class="eyebrow">Telegram MVP</p>
        <h1>Stock Alarm</h1>
      </div>
      <div class="status-strip" aria-live="polite">
        <span id="telegramStatus" class="status-pill muted">Telegram</span>
        <span id="quoteStatus" class="status-pill muted">Quotes</span>
        <span id="pollStatus" class="status-pill muted">Polling</span>
      </div>
    </header>

    <main class="layout">
      <section class="panel form-panel" aria-labelledby="addStockTitle">
        <div class="panel-heading">
          <h2 id="addStockTitle">종목 등록</h2>
        </div>

        <form id="stockForm" class="stock-form">
          <label>
            <span>종목 코드</span>
            <input name="symbol" placeholder="AAPL, TSLA, 005930.KS" autocomplete="off" required />
          </label>

          <div class="symbol-helper" aria-label="종목 예시">
            <button type="button" data-symbol="005930" data-name="삼성전자">삼성전자</button>
            <button type="button" data-symbol="000660" data-name="SK하이닉스">SK하이닉스</button>
            <button type="button" data-symbol="035720" data-name="카카오">카카오</button>
            <button type="button" data-symbol="AAPL" data-name="Apple">Apple</button>
            <button type="button" data-symbol="TSLA" data-name="Tesla">Tesla</button>
          </div>

          <label>
            <span>표시 이름</span>
            <input name="displayName" placeholder="삼성전자" autocomplete="off" />
          </label>

          <div class="field-grid">
            <label>
              <span>하락률 %</span>
              <input name="thresholdPercent" type="number" min="0.1" max="99" step="0.1" value="5" required />
            </label>

            <label>
              <span>반복 분</span>
              <input name="alertCooldownMinutes" type="number" min="1" step="1" value="30" required />
            </label>
          </div>

          <label>
            <span>메모</span>
            <textarea name="notes" rows="3" placeholder="매수 이유 또는 목표가"></textarea>
          </label>

          <div id="quotePreview" class="quote-preview" aria-live="polite"></div>

          <div class="form-actions">
            <button id="previewQuoteButton" type="button" class="secondary-button">시세 미리 확인</button>
            <button type="submit" class="primary-button">등록</button>
          </div>
        </form>
      </section>

      <section class="panel watch-panel" aria-labelledby="watchTitle">
        <div class="panel-heading split">
          <div>
            <h2 id="watchTitle">감시 종목</h2>
            <p id="summaryText" class="subtle">0개 등록</p>
          </div>
          <div class="button-row">
            <button id="checkNowButton" type="button" class="secondary-button">즉시 확인</button>
            <button id="testTelegramButton" type="button" class="secondary-button">테스트 알림</button>
          </div>
        </div>

        <div id="message" class="message" role="status" aria-live="polite"></div>
        <div id="stockList" class="stock-list"></div>
      </section>

      <section class="panel alerts-panel" aria-labelledby="alertsTitle">
        <div class="panel-heading">
          <h2 id="alertsTitle">알림 기록</h2>
        </div>
        <div id="alertList" class="alert-list"></div>
      </section>
    </main>

    <script src="/app.js" type="module"></script>
  </body>
</html>
