<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Stock Alarm · Telegram MVP</title>
    <meta name="description" content="매수 종목의 기준가 도달 여부를 확인하고 텔레그램 알림을 보내는 로컬 웹앱" />
    <meta name="theme-color" content="#161b22" />
    <meta name="color-scheme" content="dark" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Stock Alarm" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="icon" href="/icons/stock-alarm.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/icons/stock-alarm-192.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <header class="app-header">
      <div class="header-left">
        <span class="header-badge">Telegram MVP</span>
        <span class="header-title">Stock Alarm</span>
      </div>
      <div class="header-right" aria-live="polite">
        <span id="telegramStatus" class="status-chip connected">Telegram</span>
        <span id="quoteStatus" class="status-chip pipeline">Quotes</span>
        <span id="pollStatus" class="status-chip timer">Polling</span>
      </div>
    </header>

    <main class="page">
      <section class="col-left tab-section active" id="tab-register" aria-labelledby="addStockTitle">
        <div class="card">
          <div class="card-header">
            <div>
              <h2 id="addStockTitle" class="card-title">종목 등록</h2>
            </div>
          </div>

          <form id="stockForm" class="stock-form">
            <div class="register-progress" aria-label="종목 등록 단계">
              <button class="register-step-button active" type="button" data-register-step-button="1">
                <span>1</span>
                종목
              </button>
              <button class="register-step-button" type="button" data-register-step-button="2">
                <span>2</span>
                매수
              </button>
              <button class="register-step-button" type="button" data-register-step-button="3">
                <span>3</span>
                알림
              </button>
              <button class="register-step-button" type="button" data-register-step-button="4">
                <span>4</span>
                확인
              </button>
            </div>

            <section class="form-step active" data-register-step="1" aria-label="종목 선택">
              <label class="form-group">
                <span class="form-label">종목 코드</span>
                <input
                  class="form-input"
                  name="symbol"
                  placeholder="AAPL, TSLA, 005930.KS"
                  autocomplete="off"
                  required
                />
              </label>
              <div id="symbolSuggestions" class="symbol-suggestions" aria-live="polite"></div>

              <div class="symbol-helper tag-list" aria-label="종목 예시">
                <button class="tag" type="button" data-symbol="005930" data-name="삼성전자">삼성전자</button>
                <button class="tag" type="button" data-symbol="000660" data-name="SK하이닉스">SK하이닉스</button>
                <button class="tag" type="button" data-symbol="035720" data-name="카카오">카카오</button>
                <button class="tag" type="button" data-symbol="AAPL" data-name="Apple">Apple</button>
                <button class="tag" type="button" data-symbol="TSLA" data-name="Tesla">Tesla</button>
              </div>

              <label class="form-group">
                <span class="form-label">표시 이름</span>
                <input class="form-input" name="displayName" placeholder="삼성전자" autocomplete="off" />
              </label>
            </section>

            <section class="form-step" data-register-step="2" aria-label="매수 정보">
              <label class="form-group">
                <span class="form-label">매수가</span>
                <input
                  class="form-input"
                  name="purchasePrice"
                  type="text"
                  inputmode="decimal"
                  pattern="[0-9]*[.]?[0-9]*"
                  placeholder="80000"
                  required
                />
              </label>

              <label class="form-group">
                <span class="form-label">구매일</span>
                <input class="form-input" name="purchaseDate" type="date" required />
              </label>
            </section>

            <section class="form-step" data-register-step="3" aria-label="알림 조건">
              <label class="form-group">
                <span class="form-label">알림 기준</span>
                <select class="form-input" name="alertType">
                  <option value="high_drawdown" selected>최고가 대비 하락률</option>
                  <option value="purchase_loss">매수가 대비 손절률</option>
                  <option value="target_price">직접 기준가</option>
                </select>
              </label>

              <label class="form-group" data-alert-target hidden>
                <span class="form-label">직접 기준가</span>
                <input
                  class="form-input"
                  name="targetPrice"
                  type="text"
                  inputmode="decimal"
                  pattern="[0-9]*[.]?[0-9]*"
                  placeholder="93000"
                />
              </label>

              <div id="alertRuleSummary" class="alert-rule-summary"></div>

              <div class="form-row">
                <label class="form-group">
                  <span class="form-label" data-threshold-label>하락률 %</span>
                  <input
                    class="form-input"
                    name="thresholdPercent"
                    type="number"
                    min="0.1"
                    max="99"
                    step="0.1"
                    value="5"
                    required
                  />
                </label>

                <label class="form-group">
                  <span class="form-label">반복 분</span>
                  <input
                    class="form-input"
                    name="alertCooldownMinutes"
                    type="number"
                    min="1"
                    step="1"
                    value="30"
                    required
                  />
                </label>
              </div>

              <label class="form-group">
                <span class="form-label">메모</span>
                <textarea
                  class="form-textarea"
                  name="notes"
                  rows="3"
                  placeholder="매수 이유 또는 목표가"
                ></textarea>
              </label>
            </section>

            <section class="form-step" data-register-step="4" aria-label="등록 확인">
              <div id="registrationSummary" class="registration-summary"></div>
              <div id="quotePreview" class="quote-preview" aria-live="polite"></div>
            </section>

            <div class="form-actions">
              <button id="registerBackButton" type="button" class="btn btn-outline secondary-button" hidden>
                이전
              </button>
              <button id="registerNextButton" type="button" class="btn btn-primary primary-button">
                다음
              </button>
              <button id="previewQuoteButton" type="button" class="btn btn-outline secondary-button" hidden>
                기준 미리 확인
              </button>
              <button id="registerSubmitButton" type="submit" class="btn btn-primary primary-button" hidden>
                등록
              </button>
            </div>
          </form>
        </div>
      </section>

      <section class="col-right tab-section" id="tab-watch" aria-labelledby="watchTitle">
        <div class="card">
          <div class="watch-header">
            <div>
              <h2 id="watchTitle" class="card-title">감시 종목</h2>
              <p id="summaryText" class="card-subtitle">0개 등록</p>
            </div>
            <div class="watch-actions">
              <button id="checkNowButton" type="button" class="btn btn-outline btn-sm secondary-button">
                즉시 확인
              </button>
              <button id="testTelegramButton" type="button" class="btn btn-ghost btn-sm secondary-button">
                테스트 알림
              </button>
            </div>
          </div>

          <div id="message" class="message" role="status" aria-live="polite"></div>
          <div id="stockList" class="stock-list"></div>
        </div>
      </section>

      <section class="col-full tab-section" id="tab-alerts" aria-labelledby="alertsTitle">
        <div class="card">
          <div class="card-header">
            <div>
              <h2 id="serverStatusTitle" class="card-title">서버 상태</h2>
              <p id="serverStatusSummary" class="card-subtitle">상태를 확인하는 중입니다.</p>
            </div>
            <div class="watch-actions">
              <button id="refreshServerStatusButton" type="button" class="btn btn-outline btn-sm secondary-button">
                새로고침
              </button>
            </div>
          </div>
          <div id="serverStatusPanel" class="server-status-panel" aria-live="polite"></div>
        </div>

        <div class="card">
          <div class="card-header">
            <div>
              <h2 id="alertsTitle" class="card-title">알림 기록</h2>
            </div>
          </div>
          <div id="alertList" class="alert-list"></div>
        </div>

        <div class="card">
          <div class="card-header">
            <div>
              <h2 id="backupsTitle" class="card-title">데이터 백업</h2>
              <p id="backupSummary" class="card-subtitle">최근 백업을 확인합니다.</p>
            </div>
            <div class="watch-actions">
              <button id="refreshBackupsButton" type="button" class="btn btn-outline btn-sm secondary-button">
                새로고침
              </button>
              <button id="createBackupButton" type="button" class="btn btn-primary btn-sm primary-button">
                백업 생성
              </button>
            </div>
          </div>

          <div class="backup-note">
            복구를 실행하면 현재 데이터는 먼저 안전 백업으로 저장된 뒤 선택한 백업으로 되돌아갑니다.
          </div>
          <div id="backupList" class="backup-list" aria-live="polite"></div>
        </div>
      </section>
    </main>

    <nav class="mobile-nav" aria-label="모바일 화면 전환">
      <div class="mobile-nav-inner">
        <button class="nav-item active" type="button" data-tab="register">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <circle cx="12" cy="12" r="10"></circle>
            <line x1="12" y1="8" x2="12" y2="16"></line>
            <line x1="8" y1="12" x2="16" y2="12"></line>
          </svg>
          <span>종목 등록</span>
        </button>
        <button class="nav-item" type="button" data-tab="watch">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline>
          </svg>
          <span>감시 종목</span>
        </button>
        <button class="nav-item" type="button" data-tab="alerts">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path>
            <path d="M13.73 21a2 2 0 0 1-3.46 0"></path>
          </svg>
          <span>알림 기록</span>
        </button>
      </div>
    </nav>

    <script src="/app.js" type="module"></script>
  </body>
</html>
